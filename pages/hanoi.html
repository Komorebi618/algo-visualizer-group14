<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉诺塔 — 算法可视化系统</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html" style="text-decoration:none;color:inherit;">
      <div class="logo">⚙</div>
      <span class="title">算法可视化系统</span>
    </a>
  </header>

  <div class="container">
    <div class="layout">

      <!-- 左侧控制面板 -->
      <aside class="sidebar">
        <div class="panel">
          <h3 style="margin:0 0 16px;font-size:1rem;">输入数据</h3>

          <div class="controls">
            <div class="input-group">
              <label for="diskCount">盘子数（1 ~ 8）</label>
              <input type="number" id="diskCount" min="1" max="8" value="3">
            </div>

            <div class="row">
              <button class="btn btn-ghost" id="btnRandom">随机生成</button>
              <button class="btn btn-primary" id="btnRun">▶ 运行</button>
            </div>
          </div>

          <hr style="border:none;border-top:1px solid var(--glass-border);margin:16px 0;">

          <h3 style="margin:0 0 12px;font-size:1rem;">测试用例</h3>
          <div class="input-group">
            <label for="testcaseSelect">选择预置用例</label>
            <select id="testcaseSelect"></select>
          </div>

          <div id="errorBox" style="margin-top:12px;"></div>

          <hr style="border:none;border-top:1px solid var(--glass-border);margin:16px 0;">

          <div class="complexity">
            <div class="complexity-item">
              <span class="label">时间复杂度</span>
              <span class="value">O(2^n)</span>
            </div>
            <div class="complexity-item">
              <span class="label">空间复杂度</span>
              <span class="value">O(n)</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- 右侧可视化区 -->
      <main>
        <div class="canvas-wrapper">
          <div class="space-between" style="margin-bottom:12px;">
            <span style="font-weight:600;">汉诺塔</span>
            <span id="moveCountLabel" style="font-size:0.82rem;color:var(--muted);">0 步</span>
          </div>
          <div class="canvas-stage">
            <canvas id="hanoiCanvas">
              您的浏览器不支持 Canvas，请升级至现代浏览器。
            </canvas>
          </div>
        </div>

        <!-- 播放控制条 -->
        <div class="playback-bar" style="margin-top:12px;">
          <button class="btn btn-icon" id="btnFirst" title="回到开始">⏮</button>
          <button class="btn btn-icon" id="btnPrev" title="上一步">◀</button>
          <button class="btn btn-icon" id="btnPlayPause" title="播放/暂停">▶</button>
          <button class="btn btn-icon" id="btnLast" title="跳到末尾">⏭</button>
          <div class="progress" id="progressBar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
          <span id="stepCounter" style="font-size:0.82rem;color:var(--muted);white-space:nowrap;">0 / 0</span>
        </div>

        <!-- 当前步骤说明 -->
        <div class="card" style="margin-top:12px;">
          <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">当前步骤</div>
          <div id="stepDesc" style="font-size:0.9rem;">——</div>
        </div>

        <!-- 步骤日志 -->
        <div class="step-log" id="stepLog" style="margin-top:12px;"></div>
      </main>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toastContainer" style="
    position:fixed;bottom:24px;right:24px;
    display:flex;flex-direction:column;gap:8px;
    z-index:9999;pointer-events:none;
  "></div>

  <script src="../data/testcases.js" defer></script>
  <script src="../js/common.js" defer></script>
  <script src="../js/hanoi.js" defer></script>
</body>
</html>
