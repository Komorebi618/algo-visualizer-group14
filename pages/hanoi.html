<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉诺塔 — 算法可视化系统</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a class="brand" href="../index.html" style="text-decoration:none;color:inherit;">
        <div class="logo">⚙</div>
        <span class="title">算法可视化系统</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html">首页</a>
        <a href="quicksort.html">快速排序</a>
        <a href="dijkstra.html">Dijkstra</a>
        <a href="hanoi.html" class="active">汉诺塔</a>
      </nav>
    </header>

    <div class="layout">

      <!-- 左侧控制面板 -->
      <aside class="sidebar">
        <div class="panel controls">

          <!-- 算法简介 -->
          <div>
            <div class="space-between">
              <span class="algo-title">汉诺塔</span>
              <span class="badge badge-info">递归</span>
            </div>
            <p class="muted small" style="margin-top:6px">
              经典递归问题。将 N 个盘子从起始柱借助辅助柱全部移至目标柱，按"大盘永远在下"的规则。
            </p>
            <div class="complexity" style="margin-top:12px;">
              <div class="complexity-item">
                <span class="label">时间复杂度</span>
                <span class="value">O(2ⁿ)</span>
              </div>
              <div class="complexity-item">
                <span class="label">空间复杂度</span>
                <span class="value">O(n)</span>
              </div>
            </div>
          </div>

          <hr style="border:none;border-top:1px solid var(--glass-border)">

          <!-- 输入数据 -->
          <div>
            <h3 style="margin:0 0 12px;font-size:1rem;">输入数据</h3>

            <div class="input-group">
              <label for="diskCount">盘子数（1 ~ 8）</label>
              <input type="number" id="diskCount" min="1" max="8" value="3">
            </div>

            <div class="row" style="margin-top:8px;">
              <button class="btn btn-ghost" id="btnRandom">随机生成</button>
              <button class="btn btn-primary" id="btnRun">▶ 运行</button>
            </div>
          </div>

          <hr style="border:none;border-top:1px solid var(--glass-border)">

          <!-- 预设测试用例 -->
          <div>
            <h3 style="margin:0 0 12px;font-size:1rem;">预设测试用例</h3>
            <div class="input-group">
              <label for="testcaseSelect">选择预置用例</label>
              <select id="testcaseSelect"></select>
            </div>
          </div>

        </div>
      </aside>

      <!-- 右侧可视化区 -->
      <main>
        <div class="canvas-wrapper">

          <!-- 标题行 -->
          <div class="algo-header">
            <span class="algo-title">可视化面板</span>
            <button class="btn btn-ghost btn-sm" id="btnReset" disabled>↺ 重置</button>
          </div>

          <!-- Canvas -->
          <div class="canvas-stage">
            <canvas id="hanoiCanvas">
              您的浏览器不支持 Canvas，请升级至现代浏览器。
            </canvas>
          </div>

          <!-- 播放控制条 -->
          <div class="playback-bar">
            <button class="btn btn-icon" id="btnFirst" disabled title="回到开始">⏮</button>
            <button class="btn btn-icon" id="btnPrev" disabled title="上一步">◀</button>
            <button class="btn btn-icon" id="btnPlayPause" disabled title="播放/暂停">▶</button>
            <button class="btn btn-icon" id="btnLast" disabled title="跳到末尾">⏭</button>
            <div class="progress" id="progressBar">
              <div class="progress-fill" id="progressFill" style="width:0%"></div>
            </div>
            <span id="stepCounter" style="font-size:0.82rem;color:var(--muted);white-space:nowrap;">0 / 0</span>
            <span id="moveCountLabel" style="font-size:0.82rem;color:var(--muted);white-space:nowrap;">· 0 步</span>
          </div>

          <!-- 当前步骤说明 -->
          <div class="card" style="margin-top:12px;">
            <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px;">当前步骤</div>
            <div id="stepDesc" style="font-size:0.9rem;">——</div>
          </div>

          <!-- 步骤日志 -->
          <div class="step-log" id="stepLog" style="margin-top:12px;">
            <span class="muted">执行步骤将在此显示...</span>
          </div>

        </div>
      </main>
    </div>

    <footer>算法可视化系统 &copy; 2026 &nbsp;|&nbsp; 第14组</footer>
  </div>

  <script src="../data/testcases.js" defer></script>
  <script src="../js/common.js" defer></script>
  <script src="../js/hanoi.js" defer></script>
</body>
</html>
